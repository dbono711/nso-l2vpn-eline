name: Build NSO package tarball

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build assets for (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag and version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) VERSION="${TAG#v}" ;;
            *)  VERSION="$TAG" ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Create tar.gz from package root dir (l2vpn-eline/)
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          test -d l2vpn-eline

          # Tarball contains the package root CONTENTS (package-meta-data.xml at top-level after extraction)
          tar -C l2vpn-eline -czf "l2vpn-eline-${VERSION}.tar.gz" .

          sha256sum "l2vpn-eline-${VERSION}.tar.gz" > "l2vpn-eline-${VERSION}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            l2vpn-eline-${{ steps.ver.outputs.version }}.tar.gz
            l2vpn-eline-${{ steps.ver.outputs.version }}.tar.gz.sha256
